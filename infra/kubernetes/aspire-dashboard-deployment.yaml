apiVersion: apps/v1
kind: Deployment
metadata:
  name: aspire-dashboard
  labels:
    app: aspire-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aspire-dashboard
  template:
    metadata:
      labels:
        app: aspire-dashboard
    spec:
      containers:
        - name: aspire-dashboard
          image: mcr.microsoft.com/dotnet/aspire-dashboard:9.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 18888
            - containerPort: 18889
            - containerPort: 18890
          env:
            - name: DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS
              value: "true"
          volumeMounts:
            - name: dashboard-data
              mountPath: /home/app/.aspnet/DataProtection-Keys
          readinessProbe:
            httpGet:
              path: /
              port: 18888
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 18888
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
      volumes:
        - name: dashboard-data
          persistentVolumeClaim:
            claimName: aspire-dashboard-data
