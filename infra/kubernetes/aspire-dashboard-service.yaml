apiVersion: v1
kind: Service
metadata:
  name: aspire-dashboard
  labels:
    app: aspire-dashboard
spec:
  type: ClusterIP
  selector:
    app: aspire-dashboard
  ports:
    - name: ui
      port: 18888
      targetPort: 18888
      protocol: TCP
    - name: otlp
      port: 18889
      targetPort: 18889
      protocol: TCP
